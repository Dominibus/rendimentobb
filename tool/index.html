<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title
  data-it="RendimentoBB – Analisi Strategica B&B"
  data-en="RendimentoBB – Strategic B&B Investment Analysis">
RendimentoBB – Strategic B&B Investment Analysis
</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="../js/firebase-init.js"></script>

<style>
.portal-header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  z-index: 100;
  border-bottom: 1px solid #e2e8f0;
}

.lang-switch {
  display: flex;
  background: #f1f5f9;
  border-radius: 999px;
  padding: 4px;
}

.lang-btn {
  border: none;
  background: transparent;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  border-radius: 999px;
  cursor: pointer;
  color: #475569;
}

.lang-btn.active {
  background: #0f172a;
  color: white;
}

.portal-nav {
  margin-left: 40px;
  display: flex;
  gap: 25px;
  font-size: 13px;
  color: #475569;
}

.portal-nav a {
  text-decoration: none;
  color: inherit;
  font-weight: 500;
  opacity: .7;
}

.portal-nav a:hover {
  opacity: 1;
}

@media (max-width:1024px){
  .portal-nav{ display:none; }
}

.auth-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
}

.auth-modal.hidden {
  display: none;
}

.auth-box {
  background: white;
  padding: 40px;
  border-radius: 16px;
  width: 360px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.2);
}

.auth-box input {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}
</style>
</head>

<body>

<header class="portal-header">
  <div class="container nav" style="padding:20px 0; display:flex; justify-content:space-between; align-items:center;">

    <div style="display:flex; align-items:center;">
      <a href="/" style="text-decoration:none;">
        <div class="logo">
          Rendimento<span>BB</span>
        </div>
      </a>

      <div class="portal-nav">
        <a href="/tool/">Tool</a>
        <a href="#">Mutui</a>
        <a href="#">Immobili</a>
        <a href="#">Academy</a>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:20px;">
      <div class="lang-switch">
        <button class="lang-btn" onclick="setLanguage('it')" id="btn-it">IT</button>
        <button class="lang-btn" onclick="setLanguage('en')" id="btn-en">EN</button>
      </div>

      <button onclick="window.location.href='/'"
              class="btn btn-secondary"
              data-it="Home"
              data-en="Home">
        Home
      </button>
    </div>

  </div>
</header>


<div class="container" style="padding-top:120px; padding-bottom:140px;">

  <!-- INVESTMENT FORM -->
  <div class="tool-card">

    <h3 class="section-divider"
        data-it="💰 Struttura Investimento"
        data-en="💰 Investment Structure"></h3>

    <div class="form-grid">
      <div class="input-group">
        <label data-it="Prezzo immobile (€)"
               data-en="Property price (€)"></label>
        <input type="number" id="price" placeholder="150000">
      </div>

      <div class="input-group">
        <label data-it="Capitale proprio investito (€)"
               data-en="Equity invested (€)"></label>
        <input type="number" id="equity" placeholder="30000">
      </div>
    </div>

    <h3 class="section-divider"
        data-it="🏦 Struttura Finanziamento"
        data-en="🏦 Financing Structure"></h3>

    <div class="form-grid">
      <div class="input-group">
        <label data-it="Importo finanziato (€)"
               data-en="Loan amount (€)"></label>
        <input type="number" id="loanAmount" placeholder="120000">
      </div>

      <div class="input-group">
        <label data-it="Tasso annuo (%)"
               data-en="Annual interest rate (%)"></label>
        <input type="number" id="interestRate" placeholder="3.5">
      </div>

      <div class="input-group">
        <label data-it="Durata (anni)"
               data-en="Duration (years)"></label>
        <input type="number" id="loanYears" placeholder="20">
      </div>
    </div>

    <h3 class="section-divider"
        data-it="🏨 Parametri Operativi"
        data-en="🏨 Operating Parameters"></h3>

    <div class="form-grid">
      <div class="input-group">
        <label data-it="Prezzo medio notte (€)"
               data-en="Average nightly price (€)"></label>
        <input type="number" id="priceNight" placeholder="120">
      </div>

      <div class="input-group">
        <label data-it="Occupazione media (%)"
               data-en="Average occupancy (%)"></label>
        <input type="number" id="occupancy" placeholder="70">
      </div>

      <div class="input-group">
        <label data-it="Spese mensili (€)"
               data-en="Monthly expenses (€)"></label>
        <input type="number" id="expenses" placeholder="1500">
      </div>

      <div class="input-group">
        <label data-it="Commissioni piattaforme (%)"
               data-en="Platform commissions (%)"></label>
        <input type="number" id="commission" placeholder="15">
      </div>

      <div class="input-group">
        <label data-it="Tassazione stimata (%)"
               data-en="Estimated tax rate (%)"></label>
        <input type="number" id="tax" placeholder="24">
      </div>
    </div>

    <div style="text-align:center; margin-top:60px;">
      <button onclick="calculate()" class="btn btn-primary"
              data-it="Genera Analisi Strategica"
              data-en="Generate Strategic Analysis">
      </button>
    </div>

  </div>


  <!-- RESULTS -->
  <div id="results" class="results-card" style="margin-top:70px;">
    <h3 data-it="Sintesi Investimento"
        data-en="Executive Investment Summary"></h3>
    <div id="executive-kpi" class="kpi-grid"></div>
    <div id="strategic-insight" class="lock-box" style="margin-top:40px;"></div>
  </div>

  <div class="results-card">
    <div class="chart-title"
         data-it="Proiezione Cashflow 5 anni"
         data-en="5-Year Cashflow Projection"></div>
    <canvas id="roiChart" height="120"></canvas>
  </div>

</div>

<footer style="margin-top:120px;text-align:center;padding:40px 0;color:#64748b;">
  <span
    data-it="© 2026 RendimentoBB – Motore Decisionale Investimenti B&B"
    data-en="© 2026 RendimentoBB – Strategic B&B Investment Decision Engine">
  </span>
</footer>

<script src="../js/lang.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
