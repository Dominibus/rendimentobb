<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title
data-it="RendimentoBB – Analisi Strategica Investimento B&B"
data-en="RendimentoBB – Strategic B&B Investment Analysis">
RendimentoBB – Strategic B&B Investment Analysis
</title>

<meta name="description"
data-it="Simula ROI, struttura finanziaria, sostenibilità e rischio prima di investire in un B&B."
data-en="Simulate ROI, financial structure, sustainability and risk before investing in a B&B."
content="Simulate ROI, financial structure, sustainability and risk before investing in a B&B.">

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="/js/firebase-init.js"></script>

<style>

.portal-header{
padding:25px 0;
position:sticky;
top:0;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
z-index:100;
border-bottom:1px solid #e2e8f0;
}

.portal-header-inner{
display:flex;
justify-content:space-between;
align-items:center;
}

.portal-nav{
display:flex;
gap:28px;
font-size:14px;
}

.portal-nav a{
text-decoration:none;
color:#475569;
font-weight:500;
transition:.2s ease;
}

.portal-nav a:hover{
color:#0f172a;
}

.right-controls{
display:flex;
align-items:center;
gap:18px;
}

.lang-switch{
display:flex;
gap:8px;
}

.lang-btn{
padding:6px 14px;
border-radius:999px;
border:1px solid #cbd5e1;
background:white;
cursor:pointer;
font-size:13px;
font-weight:600;
}

.lang-btn.active{
background:#0f172a;
color:white;
}

.market-select{
margin-top:15px;
padding:12px;
border-radius:12px;
border:1px solid #e2e8f0;
width:100%;
font-size:14px;
}

@media(max-width:1024px){
.portal-nav{ display:none; }
}

/* ============================= */
/* MOBILE OPTIMIZATION */
/* ============================= */

@media (max-width:768px){

.container{
padding-left:20px;
padding-right:20px;
}

.portal-header-inner{
flex-direction:column;
gap:15px;
text-align:center;
}

.page-title h1{
font-size:26px;
line-height:1.3;
}

.page-title p{
font-size:15px;
}

.form-grid{
grid-template-columns:1fr;
gap:18px;
}

.tool-card{
padding:20px;
}

.results-card{
padding:20px;
}

.kpi-grid{
grid-template-columns:1fr;
gap:15px;
}

.btn{
width:100%;
padding:14px;
font-size:16px;
}

.market-select{
font-size:16px;
}

input{
font-size:16px;
}  

}  
  
</style>
</head>

<body>

<header class="portal-header">
<div class="container portal-header-inner">

<div style="display:flex; align-items:center; gap:40px;">
<a href="/" style="text-decoration:none;">
<div class="logo">Rendimento<span>BB</span></div>
</a>

<nav class="portal-nav">
<a href="/tool/">Tool</a>
<a href="#mortgage">Mutui</a>
<a href="#">Immobili</a>
<a href="/academy/">Academy</a>
<a href="/dashboard/">Dashboard</a>
</nav>
</div>

<div class="right-controls">

<div class="lang-switch">
<button class="lang-btn" onclick="setLang('it')" id="btn-it">IT</button>
<button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>

<div id="user-area"></div>

<button onclick="window.location.href='/'"
class="btn btn-secondary"
data-it="Home"
data-en="Home">
Home
</button>

</div>
</div>
</header>


<main>

<div class="container" style="padding-top:80px; padding-bottom:120px;">

<div class="page-title">

<h1
data-it="Analisi Strategica Investimento B&B"
data-en="Strategic B&B Investment Analysis">
</h1>

<p
data-it="Simula ROI, rischio e sostenibilità finanziaria prima di investire."
data-en="Simulate ROI, risk and financial sustainability before investing.">
</p>

</div>


<!-- MARKET DATA -->

<div class="tool-card">

<h3
data-it="📊 Dati di Mercato"
data-en="📊 Market Data">
</h3>

<select class="market-select"
onchange="applyMarketData(this.value)">

<option value=""
data-it="Seleziona città"
data-en="Select city">
</option>

<option value="napoli">Napoli</option>
<option value="roma">Roma</option>
<option value="milano">Milano</option>
<option value="firenze">Firenze</option>

</select>

</div>


<!-- INVESTMENT STRUCTURE -->

<div class="tool-card">

<h3 data-it="💰 Struttura Investimento"
data-en="💰 Investment Structure"></h3>

<div class="form-grid">

<div class="input-group">
<label data-it="Prezzo immobile (€)"
data-en="Property price (€)"></label>
<input type="number" id="price" placeholder="150000">
</div>

<div class="input-group">
<label data-it="Capitale proprio investito (€)"
data-en="Equity invested (€)"></label>
<input type="number" id="equity" placeholder="30000">
</div>

</div>


<h3 style="margin-top:50px;"
data-it="🏦 Struttura Finanziamento"
data-en="🏦 Financing Structure"></h3>

<div class="form-grid">

<div class="input-group">
<label data-it="Importo finanziato (€)"
data-en="Loan amount (€)"></label>
<input type="number" id="loanAmount" placeholder="120000">
</div>

<div class="input-group">
<label data-it="Tasso annuo (%)"
data-en="Annual interest rate (%)"></label>
<input type="number" id="interestRate" placeholder="3.5">
</div>

<div class="input-group">
<label data-it="Durata (anni)"
data-en="Duration (years)"></label>
<input type="number" id="loanYears" placeholder="20">
</div>

</div>


<h3 style="margin-top:50px;"
data-it="🏨 Parametri Operativi"
data-en="🏨 Operating Parameters"></h3>

<div class="form-grid">

<div class="input-group">
<label data-it="Prezzo medio notte (€)"
data-en="Average nightly price (€)"></label>
<input type="number" id="priceNight" placeholder="120">
</div>

<div class="input-group">
<label data-it="Occupazione media (%)"
data-en="Average occupancy (%)"></label>
<input type="number" id="occupancy" placeholder="70">
</div>

<div class="input-group">
<label data-it="Spese mensili (€)"
data-en="Monthly expenses (€)"></label>
<input type="number" id="expenses" placeholder="1500">
</div>

<div class="input-group">
<label data-it="Commissioni piattaforme (%)"
data-en="Platform commissions (%)"></label>
<input type="number" id="commission" placeholder="15">
</div>

<div class="input-group">
<label data-it="Tassazione stimata (%)"
data-en="Estimated tax rate (%)"></label>
<input type="number" id="tax" placeholder="24">
</div>

</div>

<div style="text-align:center; margin-top:60px;">
<button onclick="calculate()" class="btn btn-primary"
data-it="Genera Analisi Strategica"
data-en="Generate Strategic Analysis">
</button>
</div>

</div>


<!-- MORTGAGE COMPARATOR -->

<div id="mortgage" class="tool-card" style="margin-top:60px;">

<h3 data-it="🏦 Comparatore Mutui"
data-en="🏦 Mortgage Comparator"></h3>

<div class="form-grid">

<div class="input-group">
<label data-it="Importo Mutuo (€)"
data-en="Mortgage amount (€)"></label>
<input type="number" id="mortgageAmount" placeholder="120000">
</div>

<div class="input-group">
<label data-it="Durata (anni)"
data-en="Duration (years)"></label>
<input type="number" id="mortgageYears" placeholder="20">
</div>

<div class="input-group">
<label data-it="Tasso Banca A (%)"
data-en="Bank A rate (%)"></label>
<input type="number" id="rateA" placeholder="3.2">
</div>

<div class="input-group">
<label data-it="Tasso Banca B (%)"
data-en="Bank B rate (%)"></label>
<input type="number" id="rateB" placeholder="3.6">
</div>

<div class="input-group">
<label data-it="Tasso Banca C (%)"
data-en="Bank C rate (%)"></label>
<input type="number" id="rateC" placeholder="4.1">
</div>

</div>

<div style="text-align:center; margin-top:40px;">
<button onclick="compareMortgages()" class="btn btn-primary"
data-it="Confronta Mutui"
data-en="Compare Mortgages">
</button>
</div>

<div id="mortgage-results" style="margin-top:40px;"></div>

</div>


<!-- RESULTS -->

<div id="results" class="results-card" style="margin-top:70px;">

<h3 data-it="Sintesi Investimento"
data-en="Executive Investment Summary"></h3>

<div id="executive-kpi" class="kpi-grid"></div>

<div id="investment-score" class="kpi-grid" style="margin-top:25px;"></div>

<div id="strategic-insight" class="lock-box" style="margin-top:40px;"></div>

</div>


<!-- FORECAST -->

<div class="results-card">

<h3
data-it="Previsione Ricavi Mercato"
data-en="Market Revenue Forecast">
</h3>

<div id="revenue-forecast" class="kpi-grid"></div>

</div>


<!-- BENCHMARK -->

<div class="results-card">

<h3
data-it="Benchmark Mercato Città"
data-en="City Market Benchmark">
</h3>

<div id="market-benchmark" class="kpi-grid">

<div class="kpi-box">
<div class="kpi-label"
data-it="Prezzo medio notte"
data-en="Average Night Price"></div>
<div id="benchmark-price" class="kpi-value">—</div>
</div>

<div class="kpi-box">
<div class="kpi-label"
data-it="Occupazione media"
data-en="Average Occupancy"></div>
<div id="benchmark-occupancy" class="kpi-value">—</div>
</div>

<div class="kpi-box">
<div class="kpi-label"
data-it="Ricavo medio annuo"
data-en="Estimated Annual Revenue"></div>
<div id="benchmark-revenue" class="kpi-value">—</div>
</div>

</div>

</div>


<!-- MARKET COMPARISON -->

<div class="results-card">

<h3
data-it="Performance vs Mercato"
data-en="Performance vs Market">
</h3>

<div id="market-comparison" class="kpi-grid"></div>

</div>


<!-- OCCUPANCY -->

<div class="results-card">

<h3>Simulazione Occupazione</h3>

<div id="occupancy-sensitivity" class="kpi-grid"></div>

</div>


<!-- CHART -->

<div class="results-card">

<div class="chart-title"
data-it="Proiezione Cashflow 5 anni"
data-en="5-Year Cashflow Projection">
</div>

<canvas id="roiChart" height="120"></canvas>

</div>


<!-- PDF EXPORT -->

<div class="results-card" style="text-align:center;">

<h3
data-it="Report Strategico Investimento"
data-en="Strategic Investment Report">
</h3>

<p
data-it="Scarica il report professionale dell’analisi investimento."
data-en="Download the professional investment analysis report.">
</p>

<button
onclick="generateExecutivePDF()"
class="btn btn-primary"
style="padding:14px 32px;font-size:16px;margin-top:15px;"
data-it="📄 Scarica Executive Report PDF"
data-en="📄 Download Executive Report PDF">

📄 Scarica Executive Report PDF

</button>

</div>


</div>

</main>


<footer class="global-footer">
© 2026 RendimentoBB – Strategic B&B Investment Decision Engine
</footer>


<script src="/js/lang.js"></script>
<script type="module" src="/js/market-data.js"></script>
<script type="module" src="/js/app.js"></script>


<script type="module">

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const auth = getAuth();

onAuthStateChanged(auth, (user) => {

if (!user) {
window.location.href = "/login/";
}

});

</script>

</body>
</html>
