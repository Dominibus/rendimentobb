<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-it="RendimentoBB – Analisi Strategica B&B"
        data-en="RendimentoBB – Strategic B&B Investment Analysis">
RendimentoBB – Strategic B&B Investment Analysis
</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="../js/firebase-init.js"></script>
</head>

<body>

<header class="container">
  <div class="nav">
    <div class="logo">RendimentoBB</div>

    <div class="lang-toggle">
      <button id="btn-it" onclick="setLanguage('it')" class="lang-btn">IT</button>
      <button id="btn-en" onclick="setLanguage('en')" class="lang-btn">EN</button>
      <div class="lang-indicator"></div>
    </div>
  </div>
</header>

<div class="container" style="padding-top:140px; padding-bottom:140px;">

  <!-- INTRO -->
  <div style="text-align:center; margin-bottom:100px; max-width:820px; margin-left:auto; margin-right:auto;">

    <div style="font-size:14px; opacity:.6; margin-bottom:18px;"
         data-it="Simulatore strategico di sostenibilità finanziaria"
         data-en="Strategic financial sustainability simulator">
    </div>

    <h1 style="font-size:42px; line-height:1.15; margin-bottom:22px;"
        data-it="Analisi professionale investimento B&B"
        data-en="Professional B&B Investment Analysis">
    </h1>

    <p style="color:#64748b; font-size:18px; line-height:1.6;"
       data-it="Compila i dati dell’operazione per valutare ROI reale, break-even, rischio finanziario e sostenibilità nel tempo."
       data-en="Enter the operation data to evaluate real ROI, break-even, financial risk and long-term sustainability.">
    </p>

  </div>

  <!-- FORM -->
  <div class="tool-card">

    <h3 class="section-divider"
        data-it="💰 Struttura Investimento"
        data-en="💰 Investment Structure"></h3>

    <div class="form-grid">
      <div class="input-group">
        <label data-it="Prezzo immobile (€)" data-en="Property price (€)"></label>
        <input type="number" id="price" placeholder="150000">
      </div>

      <div class="input-group">
        <label data-it="Capitale proprio investito (€)" data-en="Own capital invested (€)"></label>
        <input type="number" id="equity" placeholder="30000">
      </div>
    </div>

    <h3 class="section-divider"
        data-it="🏦 Struttura Finanziamento"
        data-en="🏦 Financing Structure"></h3>

    <div class="form-grid">
      <div class="input-group">
        <label data-it="Importo finanziato (€)" data-en="Loan amount (€)"></label>
        <input type="number" id="loanAmount" placeholder="120000">
      </div>

      <div class="input-group">
        <label data-it="Tasso annuo (%)" data-en="Annual interest rate (%)"></label>
        <input type="number" id="interestRate" placeholder="3.5">
      </div>

      <div class="input-group">
        <label data-it="Durata (anni)" data-en="Duration (years)"></label>
        <input type="number" id="loanYears" placeholder="20">
      </div>
    </div>

    <h3 class="section-divider"
        data-it="🏨 Parametri Operativi"
        data-en="🏨 Operational Parameters"></h3>

    <div class="form-grid">
      <div class="input-group">
        <label data-it="Prezzo medio notte (€)" data-en="Average nightly price (€)"></label>
        <input type="number" id="priceNight" placeholder="120">
      </div>

      <div class="input-group">
        <label data-it="Occupazione media (%)" data-en="Average occupancy (%)"></label>
        <input type="number" id="occupancy" placeholder="70">
      </div>

      <div class="input-group">
        <label data-it="Spese mensili (€)" data-en="Monthly expenses (€)"></label>
        <input type="number" id="expenses" placeholder="1500">
      </div>

      <div class="input-group">
        <label data-it="Commissioni piattaforme (%)" data-en="Platform commissions (%)"></label>
        <input type="number" id="commission" placeholder="15">
      </div>

      <div class="input-group">
        <label data-it="Tassazione stimata (%)" data-en="Estimated taxes (%)"></label>
        <input type="number" id="tax" placeholder="24">
      </div>
    </div>

    <div style="text-align:center; margin-top:60px;">
      <button onclick="calculate()" class="btn btn-primary"
        style="padding:20px 50px; font-size:16px;"
        data-it="Genera Analisi Strategica"
        data-en="Generate Strategic Analysis">
      </button>
    </div>

  </div>

  <!-- RESULTS -->
  <div id="results" class="results-card" style="margin-top:70px;">
    <div class="results-intro"
      data-it="L’Executive Summary verrà generato qui dopo l’elaborazione."
      data-en="The Executive Summary will appear here after calculation.">
    </div>
  </div>

  <!-- CHART -->
  <div class="results-card">
    <div class="chart-title"
      data-it="Proiezione Cashflow 5 anni"
      data-en="5-Year Cashflow Projection"></div>
    <canvas id="roiChart" height="120"></canvas>
  </div>

  <!-- PRO BLOCK -->
  <div class="pro-lock">

    <h2
      data-it="Modalità Executive PRO"
      data-en="Executive PRO Mode"></h2>

    <p
      data-it="Sblocca stress test avanzati, analisi sensibilità tassi e report PDF professionale per decisioni ad alto impatto."
      data-en="Unlock advanced stress testing, interest rate sensitivity analysis and professional executive PDF report for high-impact decisions."></p>

    <ul>
      <li data-it="✔ Stress test multi-scenario"
          data-en="✔ Multi-scenario stress testing"></li>
      <li data-it="✔ Sensitivity tassi di interesse"
          data-en="✔ Interest rate sensitivity"></li>
      <li data-it="✔ Report PDF consulenziale"
          data-en="✔ Consultant-grade PDF report"></li>
    </ul>

    <a href="https://buy.stripe.com/test_dRmeVcdNBefv7Njf6w8N200?pro=paid"
       target="_blank"
       class="btn btn-primary"
       data-it="Sblocca PRO – 19€"
       data-en="Unlock PRO – €19">
    </a>

  </div>

  <div style="text-align:center; margin-top:80px;">
    <a href="/"
      data-it="← Torna alla homepage"
      data-en="← Back to homepage"></a>
  </div>

</div>

<!-- LANGUAGE ENGINE -->
<script src="../js/lang.js"></script>

<!-- CALCULATION ENGINE -->
<script src="../js/app.js"></script>

</body>
</html>
