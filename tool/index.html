<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RendimentoBB – Strategic B&B Investment Analysis</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<!-- HEADER COERENTE CON HOMEPAGE -->

<header class="container">
  <div class="nav">
    <div class="logo">RendimentoBB</div>

    <div class="lang-toggle">
      <button id="btn-it" onclick="setLanguage('it')" class="lang-btn active">IT</button>
      <button id="btn-en" onclick="setLanguage('en')" class="lang-btn">EN</button>
      <div class="lang-indicator"></div>
    </div>
  </div>
</header>

<div class="container" style="padding-top:80px; padding-bottom:120px;">

  <!-- TOOL INTRO -->

  <div style="text-align:center; margin-bottom:70px;">

    <h1 style="font-size:34px; margin-bottom:12px;">RendimentoBB</h1>

    <h2 style="font-size:20px; font-weight:700; margin-bottom:14px;"
        data-it="Analisi Strategica Professionale"
        data-en="Professional Strategic Analysis">
    </h2>

    <p style="max-width:750px; margin:auto; color:#64748b;"
       data-it="Inserisci i dati dell’investimento per ottenere una simulazione strutturata di ROI, sostenibilità del capitale e rischio operativo."
       data-en="Enter your investment data to receive a structured simulation of ROI, capital sustainability and operational risk.">
    </p>

  </div>

  <!-- FORM CARD -->

  <div class="tool-card">

    <!-- INVESTMENT -->
    <h3 class="section-divider"
        data-it="💰 Investimento"
        data-en="💰 Investment"></h3>

    <div class="form-grid">

      <div class="input-group">
        <label data-it="Prezzo immobile (€)" data-en="Property price (€)"></label>
        <input type="number" id="propertyPrice" placeholder="150000">
      </div>

      <div class="input-group">
        <label data-it="Capitale proprio investito (€)" data-en="Own capital invested (€)"></label>
        <input type="number" id="equity" placeholder="30000">
      </div>

    </div>

    <!-- MORTGAGE -->
    <h3 class="section-divider"
        data-it="🏦 Mutuo (Opzionale)"
        data-en="🏦 Mortgage (Optional)"></h3>

    <div class="form-grid">

      <div class="input-group">
        <label data-it="Importo finanziato (€)" data-en="Loan amount (€)"></label>
        <input type="number" id="loanAmount" placeholder="120000">
      </div>

      <div class="input-group">
        <label data-it="Tasso annuo (%)" data-en="Annual interest rate (%)"></label>
        <input type="number" id="interestRate" placeholder="3.5">
      </div>

      <div class="input-group">
        <label data-it="Durata (anni)" data-en="Duration (years)"></label>
        <input type="number" id="loanYears" placeholder="20">
      </div>

    </div>

    <!-- OPERATIONS -->
    <h3 class="section-divider"
        data-it="🏨 Operatività"
        data-en="🏨 Operations"></h3>

    <div class="form-grid">

      <div class="input-group">
        <label data-it="Prezzo medio notte (€)" data-en="Average nightly price (€)"></label>
        <input type="number" id="price" placeholder="120">
      </div>

      <div class="input-group">
        <label data-it="Occupazione media (%)" data-en="Average occupancy (%)"></label>
        <input type="number" id="occupancy" placeholder="70">
      </div>

      <div class="input-group">
        <label data-it="Spese mensili (€)" data-en="Monthly expenses (€)"></label>
        <input type="number" id="expenses" placeholder="1500">
      </div>

      <div class="input-group">
        <label data-it="Commissioni piattaforme (%)" data-en="Platform commissions (%)"></label>
        <input type="number" id="commission" placeholder="15">
      </div>

      <div class="input-group">
        <label data-it="Tasse (%)" data-en="Taxes (%)"></label>
        <input type="number" id="tax" placeholder="24">
      </div>

    </div>

    <div class="action-area">
      <button onclick="calculate()" class="btn btn-primary"
        data-it="Analizza Investimento"
        data-en="Analyze Investment"></button>
    </div>

  </div>

  <!-- RESULTS -->

  <div id="results" class="results-card">
    <div class="results-intro"
      data-it="Qui verrà mostrata la valutazione strategica dell'investimento."
      data-en="The strategic investment evaluation will appear here."></div>
  </div>

  <!-- CHART -->

  <div class="results-card" style="margin-top:35px;">
    <div class="chart-title"
      data-it="Proiezione Cashflow 5 anni"
      data-en="5-Year Cashflow Projection"></div>
    <canvas id="roiChart" height="120"></canvas>
  </div>

  <!-- PRO SECTION -->

  <div id="proBlock" class="pro-lock">

    <h2
      data-it="🔓 Versione PRO – Analisi Strategica Completa"
      data-en="🔓 PRO Version – Complete Strategic Analysis"></h2>

    <p
      data-it="Strumento avanzato per investitori che vogliono decisioni basate su dati."
      data-en="Advanced tool for investors who want data-driven decisions."></p>

    <ul>
      <li data-it="✔ Simulazione 5 anni con grafico cumulativo"
          data-en="✔ 5-year cumulative projection with chart"></li>

      <li data-it="✔ Indice rischio professionale 0–100"
          data-en="✔ Professional risk index 0–100"></li>

      <li data-it="✔ Generazione Report PDF professionale"
          data-en="✔ Professional PDF report generation"></li>
    </ul>

    <button class="btn btn-secondary"
      data-it="Sblocca Analisi PRO – 19€"
      data-en="Unlock PRO Analysis – €19"></button>

  </div>

  <div style="text-align:center; margin-top:60px;">
    <a href="/"
      data-it="← Torna alla homepage"
      data-en="← Back to homepage"></a>
  </div>

</div>

<script>
function setLanguage(lang){
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-it]").forEach(el=>{
    const text = el.getAttribute("data-"+lang);
    if(text) el.innerText = text;
  });

  document.getElementById("btn-it").classList.remove("active");
  document.getElementById("btn-en").classList.remove("active");

  document.getElementById("btn-"+lang).classList.add("active");

  const indicator = document.querySelector(".lang-indicator");
  indicator.style.transform = lang === "en" ? "translateX(100%)" : "translateX(0%)";

  localStorage.setItem("lang", lang);
}

window.addEventListener("DOMContentLoaded",()=>{
  const saved = localStorage.getItem("lang");
  const browserLang = navigator.language.startsWith("en") ? "en" : "it";
  setLanguage(saved || browserLang);
});
</script>

<script src="../js/app.js"></script>

</body>
</html>
