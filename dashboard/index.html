<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title 
data-it="Dashboard Analisi – RendimentoBB"
data-en="Analysis Dashboard – RendimentoBB">
Dashboard Analisi – RendimentoBB
</title>

<link rel="stylesheet" href="/css/style.css">

<style>

/* ================= DASHBOARD ================= */

.dashboard-container{
max-width:1200px;
margin:auto;
padding:90px 24px 80px 24px;
}

/* welcome */

.dashboard-welcome{
margin-bottom:40px;
}

.dashboard-welcome h1{
font-size:30px;
font-weight:600;
}

/* quick actions */

.dashboard-actions{
margin-top:15px;
display:flex;
gap:12px;
}

.btn-dashboard{
padding:10px 18px;
border-radius:10px;
font-size:14px;
background:#0f172a;
color:white;
text-decoration:none;
transition:0.2s;
}

.btn-dashboard:hover{
transform:translateY(-1px);
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

/* ================= CHART ================= */

/* aumenta altezza grafico ROI */

#roi-chart-container{
height:320px;
width:100%;
}
/* ================= STATS ================= */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:50px;
}

.stats-card{
background:white;
padding:28px;
border-radius:16px;
border:1px solid #e2e8f0;
box-shadow:0 15px 40px rgba(0,0,0,0.05);
}

.stats-card h3{
font-size:14px;
color:#64748b;
margin-bottom:6px;
}

.stats-value{
font-size:26px;
font-weight:600;
}

/* ================= ANALYSIS GRID ================= */

.analysis-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:22px;
margin-top:30px;
}

/* card */

.analysis-card{
background:white;
padding:26px;
border-radius:16px;
border:1px solid #e2e8f0;
box-shadow:0 18px 45px rgba(0,0,0,0.05);
transition:0.25s;
}

.analysis-card:hover{
transform:translateY(-3px);
box-shadow:0 22px 55px rgba(0,0,0,0.08);
}

/* title */

.analysis-card h3{
font-size:16px;
margin-bottom:14px;
}

/* metrics */

.metric{
font-size:14px;
margin-top:8px;
color:#475569;
display:flex;
justify-content:space-between;
}

.metric strong{
color:#0f172a;
font-weight:600;
}

/* ROI COLORS */

.roi-positive{
color:#10b981;
}

.roi-negative{
color:#ef4444;
}

/* stats */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
margin-bottom:50px;
}

/* analysis cards */

.analysis-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
}

.analysis-card{
background:white;
padding:30px;
border-radius:18px;
border:1px solid #e2e8f0;
box-shadow:0 20px 50px rgba(0,0,0,0.05);
}

.analysis-card h3{
margin-bottom:12px;
font-size:18px;
}

.metric{
font-size:14px;
margin-top:10px;
color:#475569;
}

.metric strong{
color:#0f172a;
}

</style>

</head>

<body>

<header class="portal-header">

<div class="container portal-header-inner">

<div class="logo">Rendimento<span>BB</span></div>

<nav class="portal-nav">
<a href="/">Home</a>
<a href="/tool/">Tool</a>
<a href="/academy/">Academy</a>
<a href="/dashboard/">Dashboard</a>
</nav>

<div class="header-actions">

<div class="lang-switch">

<button onclick="setLang('it')" id="btn-it">IT</button>
<button onclick="setLang('en')" id="btn-en">EN</button>

</div>

<div id="user-area" class="account-email"></div>

</div>

</div>

</header>


<main>

<div class="dashboard-container">

<!-- WELCOME -->

<div class="dashboard-welcome">

<h1
data-it="La tua dashboard investimenti"
data-en="Your investment dashboard">
La tua dashboard investimenti
</h1>

<div class="dashboard-actions">

<a href="/tool/" class="btn-dashboard"
data-it="Nuova analisi"
data-en="New analysis">
Nuova analisi
</a>

<a href="/" class="btn-dashboard"
data-it="Home"
data-en="Home">
Home
</a>

</div>

</div>


<!-- STATS -->

<div id="dashboard-stats" class="stats-grid"></div>

<div class="dashboard-top-grid">

<div id="investment-score"></div>

<div id="best-investment"></div>

</div>

<!-- ANALYSIS TITLE -->

<h2
data-it="Le tue analisi investimento"
data-en="Your investment analyses">
Le tue analisi investimento
</h2>

<!-- CASHFLOW PROJECTION -->

<div class="analysis-card">

<h3
data-it="Proiezione Cashflow"
data-en="Cashflow Projection">
💰 Proiezione Cashflow
</h3>

<div id="cashflow-chart-container" style="height:300px;margin-top:20px;"></div>

</div>
  
<!-- ANALYSIS LIST -->

<div class="analysis-card" style="margin-bottom:40px">

<h3
data-it="Andamento ROI"
data-en="ROI Trend">
📈 Andamento ROI
</h3>

<div id="roi-chart-container"></div>

</div>
  
<div id="analysis-list" class="analysis-grid"></div>

</div>

</main>


<footer class="global-footer">
© 2026 RendimentoBB – Strategic B&B Investment Decision Engine
</footer>


<script src="/js/lang.js"></script>

<script type="module" src="/js/firebase-init.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
<script type="module" src="/js/dashboard.js"></script>


<!-- ================= LANGUAGE LIVE REFRESH ================= -->

<script>

document.addEventListener("rb_language_changed", function(){

const oldScript = document.querySelector("script[src='/js/dashboard.js']");

if(!oldScript) return;

const newScript = document.createElement("script");

newScript.type = "module";
newScript.src = "/js/dashboard.js?v=" + Date.now();

oldScript.remove();
document.body.appendChild(newScript);

});

</script>


</body>

</html>
