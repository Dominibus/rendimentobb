<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title 
data-it="Dashboard Analisi – RendimentoBB"
data-en="Analysis Dashboard – RendimentoBB">
Dashboard Analisi – RendimentoBB
</title>

<link rel="stylesheet" href="/css/style.css">

<style>

/* ================= DASHBOARD ================= */

.dashboard-container{
max-width:1200px;
margin:auto;
padding:100px 24px 80px 24px;
}

/* welcome */

.dashboard-welcome{

margin-bottom:40px;

}

.dashboard-welcome h1{

font-size:28px;
font-weight:600;

}

/* quick actions */

.dashboard-actions{

margin-top:15px;
display:flex;
gap:12px;

}

.btn-dashboard{

padding:8px 16px;
border-radius:10px;
font-size:13px;
background:#0f172a;
color:white;
text-decoration:none;

}

/* stats */

.stats-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
margin-bottom:50px;

}

/* analysis cards */

.analysis-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;

}

.analysis-card{

background:white;
padding:30px;
border-radius:18px;
border:1px solid #e2e8f0;
box-shadow:0 20px 50px rgba(0,0,0,0.05);

}

.analysis-card h3{

margin-bottom:12px;
font-size:18px;

}

.metric{

font-size:14px;
margin-top:10px;
color:#475569;

}

.metric strong{

color:#0f172a;

}

</style>

</head>

<body>

<header class="portal-header">

<div class="container portal-header-inner">

<div class="logo">Rendimento<span>BB</span></div>

<nav class="portal-nav">
<a href="/">Home</a>
<a href="/tool/">Tool</a>
<a href="/academy/">Academy</a>
<a href="/dashboard/">Dashboard</a>
</nav>

<div class="header-actions">

<div class="lang-switch">

<button onclick="setLang('it')" id="lang-it">IT</button>
<button onclick="setLang('en')" id="lang-en">EN</button>

</div>

<div id="user-area"></div>

</div>

</header>


<main>

<div class="dashboard-container">

<!-- WELCOME -->

<div class="dashboard-welcome">

<h1
data-it="La tua dashboard investimenti"
data-en="Your investment dashboard">
La tua dashboard investimenti
</h1>

<div class="dashboard-actions">

<a href="/tool/" class="btn-dashboard"
data-it="Nuova analisi"
data-en="New analysis">
Nuova analisi
</a>

<a href="/" class="btn-dashboard"
data-it="Home"
data-en="Home">
Home
</a>

</div>

</div>


<!-- STATS -->

<div id="dashboard-stats" class="stats-grid"></div>


<!-- ANALYSIS TITLE -->

<h2
data-it="Le tue analisi investimento"
data-en="Your investment analyses">
Le tue analisi investimento
</h2>


<!-- ANALYSIS LIST -->

<div id="analysis-list" class="analysis-grid"></div>

</div>

</main>


<footer class="global-footer">
© 2026 RendimentoBB – Strategic B&B Investment Decision Engine
</footer>


<script src="/js/lang.js"></script>
<script type="module" src="/js/firebase-init.js"></script>
<script type="module" src="/js/dashboard.js"></script>

</body>

</html>
