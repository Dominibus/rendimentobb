<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title 
data-it="Dashboard Analisi – RendimentoBB"
data-en="Analysis Dashboard – RendimentoBB">
Dashboard Analisi – RendimentoBB
</title>

<link rel="stylesheet" href="/css/style.css">

<style>

/* ================= DASHBOARD ================= */

.dashboard-container{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

/* header welcome */

.dashboard-header{
margin-bottom:30px;
}

.dashboard-header h2{
font-size:22px;
font-weight:600;
}

/* stats */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

/* cards */

.analysis-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:30px;
}

.analysis-card{
background:white;
padding:28px;
border-radius:18px;
border:1px solid #e2e8f0;
box-shadow:0 20px 50px rgba(0,0,0,0.05);
}

.analysis-card h3{
margin-bottom:12px;
font-size:18px;
}

.metric{
font-size:14px;
margin-top:10px;
color:#475569;
}

/* buttons */

.dashboard-actions{
margin-top:15px;
display:flex;
gap:10px;
}

.btn-home{

display:inline-block;
padding:8px 14px;
border-radius:10px;
background:#0f172a;
color:white;
font-size:13px;
text-decoration:none;

}

.btn-home:hover{
opacity:.9;
}

</style>

</head>

<body>

<header class="portal-header">

<div class="container portal-header-inner">

<div class="logo">Rendimento<span>BB</span></div>

<nav class="portal-nav">
<a href="/">Home</a>
<a href="/tool/">Tool</a>
<a href="/academy/">Academy</a>
<a href="/dashboard/">Dashboard</a>
</nav>

<div id="user-area"></div>

</div>

</header>


<main>

<div class="dashboard-container">

<!-- HEADER -->

<div class="dashboard-header">

<h2
data-it="Benvenuto nella tua dashboard"
data-en="Welcome to your dashboard">
Benvenuto nella tua dashboard
</h2>

<div class="dashboard-actions">

<a href="/" class="btn-home"
data-it="Home"
data-en="Home">
Home
</a>

<a href="/tool/" class="btn-home"
data-it="Nuova analisi"
data-en="New analysis">
Nuova analisi
</a>

</div>

</div>


<!-- STATS -->

<div id="dashboard-stats" class="stats-grid"></div>


<!-- TITLE -->

<h1
data-it="Le tue analisi investimento"
data-en="Your investment analyses">
Le tue analisi investimento
</h1>


<!-- LISTA ANALISI -->

<div id="analysis-list" class="analysis-grid"></div>


</div>

</main>


<footer class="global-footer">
© 2026 RendimentoBB – Strategic B&B Investment Decision Engine
</footer>


<script src="/js/lang.js"></script>
<script type="module" src="/js/firebase-init.js"></script>
<script type="module" src="/js/dashboard.js"></script>

</body>

</html>
