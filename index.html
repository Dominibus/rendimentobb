<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title 
  data-it="RendimentoBB – Motore Decisionale per Investimenti B&B"
  data-en="RendimentoBB – Strategic B&B Investment Decision Engine">
RendimentoBB – Strategic B&B Investment Decision Engine
</title>

<meta name="description"
      data-it="Analizza ROI, mutuo e rischio prima di aprire un B&B. Decisioni immobiliari basate su dati reali."
      data-en="Analyze ROI, mortgage impact and risk before launching a B&B. Make data-driven real estate decisions."
      content="Analyze ROI, mortgage impact and risk before launching a B&B. Make data-driven real estate decisions.">

<link rel="stylesheet" href="/css/style.css">

<style>

/* HEADER DEFINITIVO */

.portal-header{
  padding:25px 0;
}

.portal-header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.portal-nav{
  display:flex;
  gap:28px;
  font-size:14px;
}

.portal-nav a{
  text-decoration:none;
  color:#475569;
  font-weight:500;
  transition:.2s ease;
}

.portal-nav a:hover{
  color:#0f172a;
}

.right-controls{
  display:flex;
  align-items:center;
  gap:18px;
}

.lang-switch{
  display:flex;
  gap:8px;
}

.lang-btn{
  padding:6px 14px;
  border-radius:999px;
  border:1px solid #cbd5e1;
  background:white;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.lang-btn.active{
  background:#0f172a;
  color:white;
}

/* HERO */

.hero{
  padding:100px 0 60px;
}

.hero .cta-group{
  margin-top:40px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* CARDS */

.snapshot-card,
.price-card{
  background:white;
  padding:50px;
  border-radius:24px;
  box-shadow:0 40px 100px rgba(0,0,0,0.06);
  border:1px solid #e2e8f0;
}

.snapshot-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:25px;
}

.metric span{
  font-size:13px;
  color:#64748b;
}

.metric strong{
  display:block;
  font-size:22px;
  margin-top:6px;
}

</style>
</head>

<body>

<header class="portal-header">
  <div class="container portal-header-inner">

    <div style="display:flex; align-items:center; gap:40px;">
      <div class="logo">Rendimento<span>BB</span></div>

      <nav class="portal-nav">
        <a href="/tool/">Tool</a>
        <a href="/tool/#mortgage">Mutui</a>
        <a href="#">Immobili</a>
        <a href="/academy/">Academy</a>
      </nav>
    </div>

    <div class="right-controls">

      <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('it')" id="btn-it">IT</button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
      </div>

      <!-- FIREBASE USER AREA -->
      <div id="user-area"></div>

    </div>

  </div>
</header>


<main>

<section class="hero container">

  <div class="page-title">
    <h1
      data-it="Verifica la sostenibilità reale del tuo investimento B&B prima di firmare."
      data-en="Validate the real sustainability of your B&B investment before signing.">
    </h1>

    <p
      data-it="Simula ROI, impatto mutuo, break-even e indice di rischio. Prendi decisioni immobiliari basate su dati reali."
      data-en="Simulate ROI, mortgage impact, break-even and risk score. Make real estate decisions based on data.">
    </p>
  </div>

  <div class="cta-group">
    <button onclick="startAnalysis()"
            class="btn btn-primary"
            data-it="Avvia Analisi"
            data-en="Start Strategic Analysis">
    </button>

    <button onclick="window.location.href='/tool/'"
            class="btn btn-outline"
            data-it="Visualizza Demo"
            data-en="View Demo">
    </button>
  </div>

</section>


<section class="container" style="margin-top:80px;">
  <div class="snapshot-card">

    <h3 style="margin-bottom:30px;"
        data-it="Executive Snapshot"
        data-en="Executive Snapshot">
    </h3>

    <div class="snapshot-grid">
      <div class="metric">
        <span>ROI</span>
        <strong style="color:#10b981;">18.4%</strong>
      </div>

      <div class="metric">
        <span data-it="Break-even" data-en="Break-even"></span>
        <strong>6.2 anni</strong>
      </div>

      <div class="metric">
        <span data-it="Indice Rischio" data-en="Risk Score"></span>
        <strong style="color:#10b981;">32/100</strong>
      </div>

      <div class="metric">
        <span data-it="Classe Investimento" data-en="Investment Grade"></span>
        <strong>A</strong>
      </div>
    </div>

  </div>
</section>


<section class="container" style="margin-top:120px;">
  <div class="price-card">

    <h2
      data-it="Versione PRO – Analisi Esecutiva Completa"
      data-en="PRO Version – Executive Investment Analysis">
    </h2>

    <p style="margin-top:20px;font-size:22px;font-weight:600;"
       data-it="19€ – Licenza Strategica"
       data-en="19€ – Strategic License">
    </p>

    <ul style="margin-top:30px;text-align:left;display:inline-block;">
      <li data-it="✔ Stress test multi-scenario"
          data-en="✔ Multi-scenario stress test"></li>
      <li data-it="✔ Sensitivity tassi di interesse"
          data-en="✔ Interest rate sensitivity"></li>
      <li data-it="✔ Analisi rischio avanzata"
          data-en="✔ Advanced risk analysis"></li>
      <li data-it="✔ Report PDF professionale"
          data-en="✔ Professional PDF report"></li>
    </ul>

    <div style="margin-top:40px;">
      <button onclick="unlockPro()"
              class="btn btn-primary"
              data-it="Sblocca Versione PRO"
              data-en="Unlock PRO Version">
      </button>
    </div>

  </div>
</section>

</main>


<footer class="global-footer">
© 2026 RendimentoBB – Strategic B&B Investment Decision Engine
</footer>


<script src="/js/lang.js"></script>
<script type="module" src="/js/firebase-init.js"></script>

<script type="module">

import { getAuth } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const auth = getAuth();

window.startAnalysis = function(){

  if(auth.currentUser){
    window.location.href="/tool/";
  }else{
    window.location.href="/login/";
  }

}

window.unlockPro = function(){

  if(auth.currentUser){
    window.location.href="/tool/#pro";
  }else{
    window.location.href="/login/";
  }

}

</script>

</body>
</html>
