<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title
  data-it="RendimentoBB – Academy Strategica B&B"
  data-en="RendimentoBB – Strategic B&B Academy">
RendimentoBB – Academy Strategica B&B
</title>

<meta name="description"
  data-it="Guida strategica per comprendere ROI, rischio e sostenibilità di un investimento B&B."
  data-en="Strategic guide to understand ROI, risk and sustainability of a B&B investment."
  content="Guida strategica per comprendere ROI, rischio e sostenibilità di un investimento B&B.">

<link rel="stylesheet" href="/css/style.css">

<style>

/* HEADER IDENTICO A HOME & TOOL */

.portal-header{
  padding:25px 0;
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  z-index:100;
  border-bottom:1px solid #e2e8f0;
}

.portal-header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.portal-nav{
  display:flex;
  gap:28px;
  font-size:14px;
}

.portal-nav a{
  text-decoration:none;
  color:#475569;
  font-weight:500;
  transition:.2s ease;
}

.portal-nav a:hover{
  color:#0f172a;
}

.right-controls{
  display:flex;
  align-items:center;
  gap:18px;
}

.lang-switch{
  display:flex;
  gap:8px;
}

.lang-btn{
  padding:6px 14px;
  border-radius:999px;
  border:1px solid #cbd5e1;
  background:white;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition:.2s ease;
}

.lang-btn.active{
  background:#0f172a;
  color:white;
}

.content-section{
  margin-top:60px;
}

.content-card{
  background:white;
  padding:50px;
  border-radius:24px;
  box-shadow:0 40px 100px rgba(0,0,0,0.06);
  border:1px solid #e2e8f0;
  margin-bottom:60px;
}

.content-card h3{
  margin-bottom:20px;
  font-size:22px;
}

.content-card p{
  color:#475569;
  line-height:1.7;
  font-size:16px;
}

@media(max-width:1024px){
  .portal-nav{ display:none; }
}

</style>
</head>

<body>

<header class="portal-header">
  <div class="container portal-header-inner">

    <div style="display:flex; align-items:center; gap:40px;">
      <a href="/" style="text-decoration:none;">
        <div class="logo">Rendimento<span>BB</span></div>
      </a>

      <nav class="portal-nav">
        <a href="/tool/">Tool</a>
        <a href="/tool/#mortgage">Mutui</a>
        <a href="#">Immobili</a>
        <a href="/academy/">Academy</a>
      </nav>
    </div>

    <div class="right-controls">
      <div class="lang-switch">
        <!-- ✅ FIX QUI -->
        <button class="lang-btn" onclick="setLang('it')" id="btn-it">IT</button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
      </div>

      <button onclick="window.location.href='/'"
              class="btn btn-secondary"
              data-it="Home"
              data-en="Home">
        Home
      </button>
    </div>

  </div>
</header>


<main>

<div class="container" style="padding-top:80px; padding-bottom:120px;">

  <div class="page-title">
    <h1
      data-it="Academy Strategica per Investimenti B&B"
      data-en="Strategic Academy for B&B Investments">
    </h1>

    <p
      data-it="Comprendi ROI, rischio, sostenibilità e leve di miglioramento prima di investire."
      data-en="Understand ROI, risk, sustainability and optimization levers before investing.">
    </p>
  </div>


  <section class="content-section">

    <div class="content-card">
      <h3
        data-it="📊 Come interpretare il ROI"
        data-en="📊 How to interpret ROI">
      </h3>

      <p
        data-it="Un ROI superiore al 10% indica buona redditività. Tuttavia è fondamentale analizzare la resilienza dell'investimento in scenari di occupazione ridotta. La stabilità del flusso di cassa è più importante del ROI nominale."
        data-en="An ROI above 10% indicates good profitability. However, resilience under lower occupancy scenarios is crucial. Cash flow stability matters more than nominal ROI.">
      </p>
    </div>


    <div class="content-card">
      <h3
        data-it="🏦 Quando il mutuo è sostenibile"
        data-en="🏦 When a mortgage is sustainable">
      </h3>

      <p
        data-it="Il flusso operativo deve coprire il debito con margine. Se il cashflow è negativo già al 70% di occupazione, l'investimento è strutturalmente fragile."
        data-en="Operating cash flow must cover debt with margin. If cash flow turns negative at 70% occupancy, the investment is structurally fragile.">
      </p>
    </div>


    <div class="content-card">
      <h3
        data-it="⚠️ Errori comuni negli investimenti B&B"
        data-en="⚠️ Common B&B investment mistakes">
      </h3>

      <p
        data-it="Sovrastimare l'occupazione media, ignorare la stagionalità e sottovalutare le spese operative sono errori frequenti. I numeri devono essere realistici e prudenziali."
        data-en="Overestimating occupancy, ignoring seasonality and underestimating operating costs are common mistakes. Numbers must be realistic and conservative.">
      </p>
    </div>


    <div class="content-card">
      <h3
        data-it="📈 Come migliorare la sostenibilità"
        data-en="📈 How to improve sustainability">
      </h3>

      <p
        data-it="Ottimizzare il prezzo medio notte, migliorare recensioni, ridurre costi fissi e negoziare un tasso mutuo competitivo può cambiare radicalmente il profilo di rischio."
        data-en="Optimizing nightly pricing, improving reviews, reducing fixed costs and negotiating competitive loan rates can radically improve the risk profile.">
      </p>
    </div>


    <div style="text-align:center;margin-top:60px;">
      <button onclick="window.location.href='/tool/'"
              class="btn btn-primary"
              data-it="Avvia Analisi Strategica"
              data-en="Start Strategic Analysis">
      </button>
    </div>

  </section>

</div>

</main>

<footer class="global-footer">
© 2026 RendimentoBB – Strategic B&B Investment Decision Engine
</footer>

<script src="/js/lang.js"></script>

</body>
</html>
