<script type="module">

import { upgradeToPro } from "/js/firebase-init.js";

const params = new URLSearchParams(window.location.search);
const uid = params.get("client_reference_id");

if(uid){

  upgradeToPro(uid)
  .then(()=>{
    console.log("PRO attivato");
  })
  .catch(err=>{
    console.error("Errore upgrade PRO:", err);
  });

}

</script>

<h1>Pagamento completato</h1>
<p>Il tuo account PRO è stato attivato.</p>

<a href="/dashboard/">Vai alla dashboard</a>
